name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0, v1.2.3, etc.
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'How to bump the version?'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - manual
      manual_version:
        description: 'Manual version (required if bump_type is manual)'
        required: false
        type: string

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'src/Hymnia.Desktop/Hymnia.Desktop.csproj'
  APP_NAME: 'Hymnia'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history for changelog generation

      - name: Calculate Next Version
        id: get_version
        run: |
          REF="${{ github.ref }}"
          EVENT="${{ github.event_name }}"
          
          # Initialize variables
          CREATE_TAG="false"
          VERSION=""
          PREVIOUS_TAG=""
          
          # Check if triggered by a Tag Push
          if [[ "$REF" == "refs/tags/v"* ]]; then
            echo "Triggered by tag push."
            VERSION=${REF#refs/tags/v}
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            CREATE_TAG="false" # Tag already exists
            
          else
            # Triggered by Branch Push (main) or Manual Dispatch
            echo "Triggered by $EVENT on $REF"
            
            BUMP_TYPE="none"
            
            if [ "$EVENT" = "workflow_dispatch" ]; then
              BUMP_TYPE="${{ inputs.bump_type }}"
            elif [ "$EVENT" = "push" ]; then
              # Use heredoc to safely handle multiline commit messages
              COMMIT_MSG=$(cat << 'EOF'
          ${{ github.event.head_commit.message }}
          EOF
          )
              echo "Commit message: $COMMIT_MSG"

              if [[ "$COMMIT_MSG" == *"[major]"* ]]; then
                BUMP_TYPE="major"
              elif [[ "$COMMIT_MSG" == *"[minor]"* ]]; then
                BUMP_TYPE="minor"
              elif [[ "$COMMIT_MSG" == *"[patch]"* ]]; then
                BUMP_TYPE="patch"
              fi
            fi
            
            echo "Bump Type: $BUMP_TYPE"
            
            if [ "$BUMP_TYPE" != "none" ]; then
              git fetch --tags
              LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
              PREVIOUS_TAG=$LATEST_TAG
              echo "Latest tag: $LATEST_TAG"
              
              if [ "$BUMP_TYPE" = "manual" ]; then
                VERSION="${{ inputs.manual_version }}"
              else
                # Remove 'v' prefix
                CLEAN_TAG=${LATEST_TAG#v}
                # Split into array
                IFS='.' read -r major minor patch <<< "$CLEAN_TAG"
                
                # Default to 0 if missing
                major=${major:-0}
                minor=${minor:-0}
                patch=${patch:-0}
                
                if [ "$BUMP_TYPE" = "major" ]; then
                  major=$((major + 1))
                  minor=0
                  patch=0
                elif [ "$BUMP_TYPE" = "minor" ]; then
                  minor=$((minor + 1))
                  patch=0
                else
                  # patch
                  patch=$((patch + 1))
                fi
                VERSION="$major.$minor.$patch"
              fi
              
              CREATE_TAG="true"
              echo "Calculated next version: $VERSION"
            else
              echo "No version bump detected. Skipping release creation."
            fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
          echo "create_tag=$CREATE_TAG" >> $GITHUB_OUTPUT
          echo "Final Version: $VERSION"

      - name: Create and Push Tag
        if: steps.get_version.outputs.create_tag == 'true' && steps.get_version.outputs.version != ''
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TAG="v$VERSION"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "Creating tag $TAG"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Generate release notes
        id: changelog
        if: steps.get_version.outputs.version != ''
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          PREVIOUS_TAG="${{ steps.get_version.outputs.previous_tag }}"

          # Get commits since last tag
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..HEAD)
          fi

                REPO="${{ github.repository }}"
                BASE_URL="https://github.com/$REPO/releases/download/v$VERSION"
                
                # Generate Markdown Body
                echo "## 🚀 Download Hymnia v$VERSION" > release_body.md
                echo "" >> release_body.md
                echo "| Platform                  | Download                                                                         | Type                    |" >> release_body.md
                echo "| :--- | :----------------- | :----------------------------------------------------------------------------------------------------------|" >> release_body.md
                echo "| **Windows (x64)**          | [**Download Installer**]($BASE_URL/Hymnia-Windows-x64-Setup.exe)                     | Auto-updating Installer |" >> release_body.md
                echo "| **Windows (ARM64)**        | [**Download Installer**]($BASE_URL/Hymnia-Windows-arm64-Setup.exe)                   | Auto-updating Installer |" >> release_body.md
                echo "| **Windows**               | [Portable Zip (x64)]($BASE_URL/Hymnia-v$VERSION-windows-x64.zip)                     | Manual                  |" >> release_body.md
                echo "| **Linux (x64)**           | [**Download AppImage**]($BASE_URL/Hymnia-x64.AppImage)                              | Auto-updating Installer |" >> release_body.md
                echo "| **Linux (ARM64)**         | [**Download AppImage**]($BASE_URL/Hymnia-arm64.AppImage)                            | Auto-updating Installer |" >> release_body.md
                echo "| **Linux**                 | [Portable Tarball (x64)]($BASE_URL/Hymnia-v$VERSION-linux-x64.tar.gz)                | Manual                  |" >> release_body.md
                echo "" >> release_body.md
                echo "---" >> release_body.md
                echo "### 📝 What's New" >> release_body.md
                echo "$COMMITS" >> release_body.md

      - name: Create Release
        id: create_release
        if: steps.get_version.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Hymnia v${{ steps.get_version.outputs.version }}
          body_path: release_body.md
          draft: false
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows
    needs: create-release
    if: needs.create-release.outputs.version != ''
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Windows x64
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ needs.create-release.outputs.version }} `
            -p:DefineConstants=TARGET_X64 `
            -o ./publish/win-x64

      - name: Build Windows ARM64
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
            -c Release `
            -r win-arm64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ needs.create-release.outputs.version }} `
            -p:DefineConstants=TARGET_ARM64 `
            -o ./publish/win-arm64

      - name: Copy Resources to publish folders
        run: |
          New-Item -ItemType Directory -Force -Path ./publish/win-x64/Resources
          Copy-Item -Path ./Resources/hymns.db -Destination ./publish/win-x64/Resources/ -Force
          New-Item -ItemType Directory -Force -Path ./publish/win-arm64/Resources
          Copy-Item -Path ./Resources/hymns.db -Destination ./publish/win-arm64/Resources/ -Force

      - name: Install Velopack
        run: dotnet tool install -g vpk

      - name: Create Velopack Release (x64)
        run: |
          vpk pack --packId ${{ env.APP_NAME }} `
            --packVersion ${{ needs.create-release.outputs.version }} `
            --packDir ./publish/win-x64 `
            --mainExe Hymnia.Desktop.exe `
            --outputDir ./Releases/win-x64

      - name: Create Velopack Release (ARM64)
        run: |
          vpk pack --packId ${{ env.APP_NAME }} `
            --packVersion ${{ needs.create-release.outputs.version }} `
            --packDir ./publish/win-arm64 `
            --mainExe Hymnia.Desktop.exe `
            --outputDir ./Releases/win-arm64

      - name: Merge Velopack Release Indices
        run: |
          # Merge releases.win.json files
          # Note: On Windows, we can use powershell to merge or just upload them separately.
          # Velopack usually expects a unified releases.win.json for auto-updates.
          # For simplicity and reliability in GHA, we'll just upload both and let users choose.
          # But we can try to merge them if jq is available (it is in windows-latest)
          # Actually, powershell is easier:
          $x64 = Get-Content ./Releases/win-x64/releases.win.json | ConvertFrom-Json
          $arm64 = Get-Content ./Releases/win-arm64/releases.win.json | ConvertFrom-Json
          ($x64 + $arm64) | ConvertTo-Json | Set-Content ./Releases/releases.win.json

      - name: Upload Velopack RELEASES files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: |
            ./Releases/win-x64/RELEASES
            ./Releases/win-arm64/RELEASES
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Velopack nupkgs
        uses: softprops/action-gh-release@v2
        if: ${{ env.NUPKG_FILE != '' }}
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: |
            ${{ env.NUPKG_FILE }}
            ./Releases/win-x64/*.nupkg
            ./Releases/win-arm64/*.nupkg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find and Rename Velopack Setups
        shell: pwsh
        run: |
          $x64Setup = Get-ChildItem -Path ./Releases/win-x64 -Filter "*Setup.exe" | Select-Object -First 1
          if ($x64Setup) {
            $renamed = Join-Path (Split-Path $x64Setup.FullName) "Hymnia-Windows-x64-Setup.exe"
            Move-Item -Path $x64Setup.FullName -Destination $renamed -Force
            echo "X64_SETUP=$renamed" >> $env:GITHUB_ENV
          }
          $arm64Setup = Get-ChildItem -Path ./Releases/win-arm64 -Filter "*Setup.exe" | Select-Object -First 1
          if ($arm64Setup) {
            $renamed = Join-Path (Split-Path $arm64Setup.FullName) "Hymnia-Windows-arm64-Setup.exe"
            Move-Item -Path $arm64Setup.FullName -Destination $renamed -Force
            echo "ARM64_WIN_SETUP=$renamed" >> $env:GITHUB_ENV
          }

      - name: Upload Windows Setups
        uses: softprops/action-gh-release@v2
        if: ${{ env.X64_SETUP != '' || env.ARM64_WIN_SETUP != '' }}
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: |
            ${{ env.X64_SETUP }}
            ${{ env.ARM64_WIN_SETUP }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Windows ZIPs (fallback)
        run: |
          Compress-Archive -Path ./publish/win-x64/* -DestinationPath ./${{ env.APP_NAME }}-v${{ needs.create-release.outputs.version }}-windows-x64.zip
          Compress-Archive -Path ./publish/win-arm64/* -DestinationPath ./${{ env.APP_NAME }}-v${{ needs.create-release.outputs.version }}-windows-arm64.zip

      - name: Upload Windows ZIP Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: |
            ./${{ env.APP_NAME }}-v${{ needs.create-release.outputs.version }}-windows-x64.zip
            ./${{ env.APP_NAME }}-v${{ needs.create-release.outputs.version }}-windows-arm64.zip
          token: ${{ secrets.GITHUB_TOKEN }}


  build-linux:
    name: Build Linux
    needs: create-release
    if: needs.create-release.outputs.version != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Linux x64
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:Version=${{ needs.create-release.outputs.version }} \
            -p:DefineConstants=TARGET_X64 \
            -o ./publish/linux-x64

      - name: Build Linux ARM64
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -r linux-arm64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:Version=${{ needs.create-release.outputs.version }} \
            -p:DefineConstants=TARGET_ARM64 \
            -o ./publish/linux-arm64

      - name: Copy Resources to publish folders
        run: |
          mkdir -p ./publish/linux-x64/Resources
          cp ./Resources/hymns.db ./publish/linux-x64/Resources/
          mkdir -p ./publish/linux-arm64/Resources
          cp ./Resources/hymns.db ./publish/linux-arm64/Resources/

      - name: Install Velopack
        run: dotnet tool install -g vpk

      - name: Create Velopack Release (x64)
        run: |
          vpk pack --packId ${{ env.APP_NAME }} \
            --packVersion ${{ needs.create-release.outputs.version }} \
            --packDir ./publish/linux-x64 \
            --mainExe Hymnia.Desktop \
            --outputDir ./Releases/linux-x64

      - name: Create Velopack Release (ARM64)
        run: |
          vpk pack --packId ${{ env.APP_NAME }} \
            --packVersion ${{ needs.create-release.outputs.version }} \
            --packDir ./publish/linux-arm64 \
            --mainExe Hymnia.Desktop \
            --outputDir ./Releases/linux-arm64

      - name: Merge Velopack Release Indices
        run: |
          mkdir -p ./Releases
          cat ./Releases/linux-x64/releases.linux.json ./Releases/linux-arm64/releases.linux.json | jq -s 'add' > ./Releases/releases.linux.json

      - name: Upload Velopack JSON Release Index
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: ./Releases/releases.linux.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find and Upload Velopack AppImages
        run: |
          X64_APPIMAGE=$(find ./Releases/linux-x64 -name "*.AppImage" | head -n 1)
          if [ -n "$X64_APPIMAGE" ]; then
            mv "$X64_APPIMAGE" ./Releases/Hymnia-x64.AppImage
            echo "X64_APPIMAGE=./Releases/Hymnia-x64.AppImage" >> $GITHUB_ENV
          fi
          ARM64_APPIMAGE=$(find ./Releases/linux-arm64 -name "*.AppImage" | head -n 1)
          if [ -n "$ARM64_APPIMAGE" ]; then
            mv "$ARM64_APPIMAGE" ./Releases/Hymnia-arm64.AppImage
            echo "ARM64_APPIMAGE=./Releases/Hymnia-arm64.AppImage" >> $GITHUB_ENV
          fi

      - name: Upload Velopack AppImages
        if: ${{ env.X64_APPIMAGE != '' || env.ARM64_APPIMAGE != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: |
            ${{ env.X64_APPIMAGE }}
            ${{ env.ARM64_APPIMAGE }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Linux ZIPs
        run: |
          cd ./publish/linux-x64
          tar -czf ../../${{ env.APP_NAME }}-v${{ needs.create-release.outputs.version }}-linux-x64.tar.gz .
          cd ../../publish/linux-arm64
          tar -czf ../../${{ env.APP_NAME }}-v${{ needs.create-release.outputs.version }}-linux-arm64.tar.gz .
          cd ../..

      - name: Upload Linux Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: |
            ./${{ env.APP_NAME }}-v${{ needs.create-release.outputs.version }}-linux-x64.tar.gz
            ./${{ env.APP_NAME }}-v${{ needs.create-release.outputs.version }}-linux-arm64.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}